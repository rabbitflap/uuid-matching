<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UUID 専用マッチングアプリ</title>

    <meta
      name="description"
      content="UUID による、UUID のためのマッチングアプリ"
    />

    <meta property="og:title" content="UUID 専用マッチングアプリ" />
    <meta
      property="og:description"
      content="UUID による、UUID のためのマッチングアプリ"
    />
    <meta
      property="og:url"
      content="https://uuid.rabbitflap.com/"
    />
    <meta
      property="og:image"
      content="https://uuid.rabbitflap.com/og.png"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UUID 専用マッチングアプリ" />

    <meta name="twitter:title" content="UUID 専用マッチングアプリ" />
    <meta
      name="twitter:description"
      content="UUID による、UUID のためのマッチングアプリ"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://uuid.rabbitflap.com/og.png"
    />
  </head>
  <body>
    <header>
      <h1>UUID 専用マッチングアプリ</h1>
    </header>
    <main>
      <section id="question">
        <p>あなたは UUID ですか？</p>
        <button id="yes">はい</button>
        <button id="no">いいえ</button>
      </section>
      <section id="retry" style="display: none">
        <button id="rematch">再マッチング</button>
        <button id="restart">最初からやり直す</button>
      </section>
      <section id="result" style="display: none">
        <p id="result-text"></p>
      </section>
    </main>

    <hr />

    <footer>
      <p>
        forked from
        <a href="https://uec-matching.mimifuwacc.workers.dev/">電通大生専用マッチングアプリ</a>
        &nbsp;(<a href="https://github.com/mimifuwacc/uec-matching/">mimifuwacc/uec-matching</a>)
      </p>

      <p>
        © 2026 mimifuwacc (original)
        <br>
        © 2026 Rabbit Flap (fork)
      </p>
    </footer>

    <script>
      const questionSection = document.querySelector("#question");
      const yesButton = questionSection.querySelector("#yes");
      const noButton = questionSection.querySelector("#no");

      const retrySection = document.querySelector("#retry");
      const retryButton = retrySection.querySelector("#rematch");
      const restartButton = retrySection.querySelector("#restart");

      const resultSection = document.querySelector("#result");
      const resultText = resultSection.querySelector("#result-text");

      const match = async () => {
        questionSection.style.display = "none";
        resultSection.style.display = "block";
        console.log(resultSection);
        resultText.textContent = "マッチング中";

        await new Promise((resolve) => setTimeout(resolve, 2000);

        retrySection.style.display = "block";

        const uuid = crypto.randomUUID()

        resultText.innerHTML = `あなたに合う UUID は<code style="font-size: 14px; font-weight: 700; background-color: whitesmoke; padding: 4px; margin: 0 2px;">${uuid}</code>です`;
      };

      yesButton.addEventListener("click", async () => {
        await match();
      });

      noButton.addEventListener("click", () => {
        questionSection.style.display = "none";

        retrySection.style.display = "block";
        retryButton.style.display = "none";
        restartButton.style.display = "inline-block";

        resultSection.style.display = "block";
        resultText.textContent = "UUID 以外は利用することができません";
      });

      retryButton.addEventListener("click", async () => {
        await match();
      });

      restartButton.addEventListener("click", () => {
        retrySection.style.display = "none";
        resultSection.style.display = "none";
        questionSection.style.display = "block";
      });
    </script>
  </body>
</html>
